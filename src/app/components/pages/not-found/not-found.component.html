<main class="w-full bg-ink-0 text-ink-900 min-h-[70vh] flex items-center">
  <div class="max-w-7xl mx-auto px-6 sm:px-10 py-24 sm:py-32 w-full">
    <p class="meta mb-8" i18n="@@notfound.meta">Erreur 404</p>
    <h1 class="font-display text-display-lg font-semibold mb-8" i18n="@@notfound.title">
      Page introuvable<span class="text-ink-400">.</span>
    </h1>
    <p class="text-lg text-ink-500 max-w-xl mb-12" i18n="@@notfound.body">
      La page que vous cherchez n'existe pas · ou plus. Retournez à l'accueil pour explorer le catalogue.
    </p>
    <a routerLink="/" class="btn-primary" i18n="@@notfound.cta">Retour à l'accueil</a>
  </div>
</main>
