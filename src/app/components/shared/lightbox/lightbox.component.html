<div
  *ngIf="open && current as photo"
  class="lightbox-backdrop"
  (click)="onBackdropClick($event)"
  (touchstart)="onTouchStart($event)"
  (touchend)="onTouchEnd($event)"
  role="dialog"
  aria-modal="true"
>
  <button
    type="button"
    class="lightbox-close"
    (click)="close()"
    aria-label="Close"
    i18n-aria-label="@@gallery.close.aria"
  >
    <svg width="20" height="20" viewBox="0 0 16 16" fill="none" aria-hidden="true">
      <path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.5" />
    </svg>
  </button>

  <button
    type="button"
    class="lightbox-arrow lightbox-arrow-prev"
    (click)="prev()"
    aria-label="Previous photo"
    i18n-aria-label="@@gallery.prev.aria"
  >
    <svg width="22" height="22" viewBox="0 0 16 16" fill="none" aria-hidden="true">
      <path d="M10 2L4 8l6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </button>

  <button
    type="button"
    class="lightbox-arrow lightbox-arrow-next"
    (click)="next()"
    aria-label="Next photo"
    i18n-aria-label="@@gallery.next.aria"
  >
    <svg width="22" height="22" viewBox="0 0 16 16" fill="none" aria-hidden="true">
      <path d="M6 2l6 6-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </button>

  <figure class="lightbox-figure" (click)="$event.stopPropagation()">
    <img [src]="photo.src" [alt]="photo.eventTitle" class="lightbox-image" />

    <figcaption class="lightbox-caption">
      <div class="lightbox-info">
        <p class="lightbox-title">{{ photo.eventTitle }} {{ photo.eventYear }}</p>
        <p class="lightbox-credits">
          <span i18n="@@gallery.by">par</span>&nbsp;&#64;{{ photo.photographer }}
        </p>
      </div>
      <button
        type="button"
        class="lightbox-download"
        (click)="download(photo)"
        [disabled]="downloading"
      >
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M8 2v9m0 0l-3-3m3 3l3-3M3 13h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <span i18n="@@gallery.download">Télécharger</span>
      </button>
    </figcaption>
  </figure>
</div>
