<section class="border-b border-ink-200">
  <div class="max-w-7xl mx-auto px-6 sm:px-10 py-16 sm:py-24">
    <div class="grid grid-cols-1 md:grid-cols-12 gap-8 md:gap-12 items-center">
      <div class="md:col-span-7 space-y-6" [class.md:order-2]="reversed" [class.md:col-start-6]="reversed">
        <ng-content select="[card-title]"></ng-content>
        <ng-content select="[card-description]"></ng-content>
        <div class="flex flex-wrap gap-x-6 gap-y-2 pt-2">
          <ng-content select="[card-links]"></ng-content>
        </div>
      </div>
      <div class="md:col-span-5 artist-image relative w-full aspect-[4/3] overflow-hidden bg-ink-100" [class.md:col-start-1]="reversed" [class.md:row-start-1]="reversed">
        <img loading="lazy" [src]="imageSrc" [alt]="imageAlt" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 ease-editorial" />
      </div>
    </div>
  </div>
</section>
